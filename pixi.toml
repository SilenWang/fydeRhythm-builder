[workspace]
authors = ["Sylens Wong <qiumin14@163.com>"]
channels = ["conda-forge"]
name = "fydeRhythm-builder"
platforms = ["linux-64"]
version = "0.1.0"

[environments]
crx = ['crx']
wasm = ['wasm']

[feature.wasm.dependencies]
nodejs = '14.*'

[feature.crx.tasks]
# 使用git submodule获取代码
get-code = { cmd = 'git submodule update --init --recursive fydeRhythm-dev' }
# 切换到指定commit
checkout-commit = { cmd = 'cd fydeRhythm-dev && git fetch origin dev && git checkout ${1}' }
# 直接从官方项目获取编译的wasm，因为从头编译未成功
get-wasm = { cmd = 'curl -L -o temp.zip https://github.com/FydeOS/fydeRhythm/releases/download/rel-2.1.5/FydeRhythm-rel-2.1.5.zip && unzip -j temp.zip "assets/rime_emscripten.wasm" "static/background/index.js" -d ./ && mv rime_emscripten.wasm fydeRhythm-dev/assets/rime_emscripten.wasm && mv index.js fydeRhythm-dev/background/rime_emscripten.js && rm temp.zip', depends-on = ['get-code'] }
init = { cmd = 'pnpm install && npm install -g crx3', cwd = 'fydeRhythm-dev', depends-on = ['get-code', 'get-wasm']}
build = { cmd = 'pnpm build && cp -r inputview build/chrome-mv3-prod && crx3 build/chrome-mv3-prod -o fydeRhythm.crx', cwd = 'fydeRhythm-dev' }

[feature.crx.dependencies]
nodejs = '18.*'
pnpm = '*'
git = '*'